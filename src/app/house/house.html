<mat-tab-group>
  <mat-tab label="Casas"> 

    <mat-button-toggle-group name="fontStyle" aria-label="Font Style">
      <mat-button-toggle [value]="negotiation.VENDA" (click)="changeTypeNegotiation(negotiation.VENDA)">Comprar</mat-button-toggle>
      <mat-button-toggle [value]="negotiation.ARRENDAMENTO" (click)="changeTypeNegotiation(negotiation.ARRENDAMENTO)">Alugar</mat-button-toggle>
      <mat-button-toggle value="italic">Preço baixo</mat-button-toggle>
      <mat-button-toggle value="italic">Preço alto</mat-button-toggle>

    </mat-button-toggle-group>


    <div class="container-fluid">
        @for(house of houses(); track house.idHouse){
          <app-house-partial [houseData]="house"/>
            
        }@empty {
        <p class="text-center fs-3 mt-5">
          <strong>Nenhuma casa disponível.</strong>
        </p>
        }
      
    </div>

    <div class="d-grid gap-2 mt-3 mb-2">
       <button matFab extended (click)="goToNextPage()">
        <mat-icon>visibility</mat-icon>
        Próxima página
      </button>
    </div>

  </mat-tab>

  <mat-tab label="Minhas publicações">
    <div class="container-fluid">
        @for(house of myhouses(); track house.idHouse){
          <app-house-partial [houseData]="house"/>
            
        }@empty {
        <p class="text-center fs-3 mt-5">
          <strong>Nenhuma casa disponível.</strong>
        </p>
        }
      
    </div>

    <div class="d-grid gap-2 mt-3 mb-2">
       <button matFab extended (click)="goToNextMyPage()">
        <mat-icon>visibility</mat-icon>
        Próxima página
      </button>
    </div>
  </mat-tab>
  <mat-tab label="Minha lista favorita"> Minha lista favorita </mat-tab>
</mat-tab-group>
