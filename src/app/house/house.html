<div class="d-flex justify-content-end gap-2">
  <button type="button" class="btn btn-light" (click)="getHouses(ACTION.HOUSES)">
    <i class="bi bi-buildings me-1"></i>Casas
  </button>
  <button type="button" class="btn btn-light" (click)="getHouses(ACTION.OWNER_HOUSE)">
    <i class="bi bi-person-lines-fill me-1"></i>Minhas publicações
  </button>
  <button type="button" class="btn btn-light" (click)="getHouses(ACTION.FAVORITES_HOUSE)">
    <i class="bi bi-heart me-1"></i>Favoritas
  </button>
</div>

<div class="container-fluid py-3">

  <div class="container-fluid px-0">
    @for (house of houses(); track house.idHouse) {
      <app-house-partial [houseData]="house" />
    } @empty {
      <p class="text-center fs-3 mt-5">
        <strong>Nenhuma casa disponível.</strong>
      </p>
    }
  </div>

  <div class="d-grid gap-2 mt-3 mb-2">
    <button type="button" class="btn btn-nobiva" (click)="goToNextPage()">
      <i class="bi bi-eye me-2"></i>Próxima página
    </button>
  </div>

</div>
