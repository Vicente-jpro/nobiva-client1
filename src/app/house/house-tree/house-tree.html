@if (user.isLoggedIn()) {
  <div class="list-group list-group-flush">
    @for (node of dataSource; track node.name) {
      @if (node.children && node.children.length > 0) {
        <button type="button" class="list-group-item list-group-item-action fw-semibold d-flex justify-content-between align-items-center"
                (click)="toggle(node.name)">
          <span><i class="bi bi-folder me-2 text-purple"></i>{{ node.name }}</span>
          <i class="bi" [class.bi-chevron-down]="isExpanded(node.name)"
                        [class.bi-chevron-right]="!isExpanded(node.name)"></i>
        </button>
        @if (isExpanded(node.name)) {
          @for (child of node.children; track child.name) {
            <button type="button" class="list-group-item list-group-item-action ps-4"
                    (click)="sendSelectedTreeToHouse(child.name)">
              <i class="bi bi-dash me-2"></i>{{ child.name }}
            </button>
          }
        }
      } @else {
        <button type="button" class="list-group-item list-group-item-action"
                (click)="sendSelectedTreeToHouse(node.name)">
          <i class="bi bi-file me-2"></i>{{ node.name }}
        </button>
      }
    }
  </div>
}
