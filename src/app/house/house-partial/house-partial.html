<div class="container-fluid">
    <div class="row mt-3">
        <mat-card appearance="outlined">
            <mat-card-content>

                <div class="row">
                    <div class="col-4">
                        <img src="https://via.placeholder.com/300x200" alt="House Image" class="img-fluid">
                    </div>
                    <div class="col-8">
                        <p > <button matButton class="fs-5">Apartamento de luxo na zona nobre de Luanda</button> </p>
                        <p>Localização: Lisboa, Portugal</p>
                        <p class="fs-4">500.000€</p>
                        <p >Descrição: Casa espaçosa com 4 quartos, piscina e jardim.</p>
                        
                        <div class="row">
                            <div class="col">
                                <mat-card-actions>

                                    <div class="example-button-row">
                                        <div class="example-flex-container">
                                            <button matMiniFab aria-label="Example icon button with a menu icon">
                                                <mat-icon>edit</mat-icon>
                                            </button>
                                            <button matMiniFab aria-label="Example icon button with a home icon">
                                                <mat-icon>delete</mat-icon>
                                            </button>
                                            <button matMiniFab aria-label="Example icon button with a home icon">
                                                <mat-icon>favorite</mat-icon>
                                            </button>
                                        </div>
                                    </div>

                                </mat-card-actions>
                            </div>
                            <div class="col d-flex justify-content-end">
                                 <mat-card-actions>
                                  <section>
                                
                                <div class="example-button-row">
                                    <div class="example-flex-container">
  
                                  

                                    <button mat-raised-button color="primary">Ver Detalhes</button>
                                    </div>
                                </div>
                                </section>
                                </mat-card-actions>
                            </div>
                        </div>
                  

                    </div>
                </div>

            </mat-card-content>
        </mat-card>
    </div>

    
</div>
