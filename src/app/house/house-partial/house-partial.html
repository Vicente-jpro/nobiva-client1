<div class="row mt-3">
    <mat-card appearance="outlined">
        <mat-card-content>

            <div class="row">
                <div class="col-12 col-md-4">
                    <img [src]="houseData.imageUrl" class="img-fluid" style="max-height:255px; object-fit:cover; width:100%" />
                </div>
                <div class="col-12 col-md-8">

                    <p> 
                        <app-success [successMessageData]="display.success"/>
                        <app-danger [dangerMessagesData]="display.errors"/>
                    </p>

                    <p > <button matButton class="fs-5">{{ houseData.title }}</button> </p>
                    @if (houseData.avaliable) {
                        <p >{{ houseData.tipology }}, Disponivel</p>
                    }@else {
                          <p >{{ houseData.tipology }}, Indisponível</p>
                    }
                    <p> {{ houseData.street1 }}, {{ houseData.locality }}, {{ houseData.province }}, {{ houseData.country }}</p>
                    <p class="fs-4" > <strong>{{ houseData.price }}</strong> </p>
                  
                    <p >{{ houseData.description }}</p>
                    
                    <div class="row">
                        <div class="col">
                            <mat-card-actions>

                                <div class="example-button-row">
                                    <div class="example-flex-container">
                                        
                                        <app-favorite 
                                         [roomData]="roomData"
                                        [houseData]="houseData" 
                                        (onSaveFavoriteEvent)="saveFavorite($event)"/>

                                        <app-dialog-email-message 
                                        [roomData]="roomData"
                                        [houseData]="houseData" />
                                    </div>
                                </div>

                            </mat-card-actions>
                        </div>
                        <div class="col d-flex justify-content-end">
                                <mat-card-actions>
                                <section>
                                    <div class="example-button-row">
                                        <div class="example-flex-container">
                                            <button mat-raised-button color="primary" [routerLink]="[houseData.idHouse]">Ver Detalhes</button>
                                        </div>
                                    </div>
                                </section>
                            </mat-card-actions>
                        </div>
                    </div>
                

                </div>
            </div>

        </mat-card-content>
    </mat-card>
</div>
