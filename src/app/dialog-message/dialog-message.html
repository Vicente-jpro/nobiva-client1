<div class="modal-header border-0 pb-0">
  <h5 class="modal-title fw-bold" mat-dialog-title>
    <i class="bi bi-info-circle me-2 text-purple"></i>{{ dialogTitle }}
  </h5>
</div>
<mat-dialog-content>
  <div class="modal-body pt-2">
    <p class="mb-0">{{ dialogContent }}</p>
  </div>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <div class="modal-footer border-0 pt-0">
    <button mat-dialog-close class="btn btn-secondary btn-sm">
      <i class="bi bi-x me-1"></i>Fechar
    </button>
  </div>
</mat-dialog-actions>
