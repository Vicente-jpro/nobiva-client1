    <div class="card border-0 shadow-sm mb-4">
      <div class="card-body">
        <div class="row g-3 align-items-end">
          <div class="col-12 col-md-3">
            <label class="form-label fw-semibold small">Pesquisar</label>
            <input type="text" class="form-control form-control-sm"
                   placeholder="Título, localidade..."
                   [(ngModel)]="filterSearch">
          </div>
          <div class="col-6 col-md-2">
            <label class="form-label fw-semibold small">Estado</label>
            <select class="form-select form-select-sm" [(ngModel)]="filterStatus">
              <option value="">Todos</option>
              <option [value]="statusPost.APROVADO">Aprovado</option>
              <option [value]="statusPost.PENDENTE">Pendente</option>
              <option [value]="statusPost.REPROVADO">Reprovado</option>
              <option [value]="statusPost.BLOQUEADO">Bloqueado</option>
            </select>
          </div>
          <div class="col-6 col-md-2">
            <label class="form-label fw-semibold small">Tipo</label>
            <select class="form-select form-select-sm" [(ngModel)]="filterType">
              <option value="">Todos</option>
              <option [value]="negotiation.VENDA">Venda</option>
              <option [value]="negotiation.ARRENDAMENTO">Arrendamento</option>
            </select>
          </div>
          <div class="col-12 col-md-3">
            <label class="form-label fw-semibold small">Tipologia</label>
            <div class="d-flex flex-wrap gap-2">
              @for (t of tipologyKeys; track t) {
                <div class="form-check form-check-inline m-0">
                  <input class="form-check-input" type="checkbox"
                         [id]="'tip-' + t"
                         [value]="t"
                         [checked]="filterTipologies.includes(t)"
                         (change)="toggleTipology(t)">
                  <label class="form-check-label small" [for]="'tip-' + t">{{ t }}</label>
                </div>
              }
            </div>
          </div>
          <div class="col-6 col-md-2">
            <label class="form-label fw-semibold small">Preço mín.</label>
            <input type="number" class="form-control form-control-sm" placeholder="0"
                   [(ngModel)]="filterMinPrice" min="0">
          </div>
          <div class="col-6 col-md-2">
            <label class="form-label fw-semibold small">Preço máx.</label>
            <input type="number" class="form-control form-control-sm" placeholder="∞"
                   [(ngModel)]="filterMaxPrice" min="0">
          </div>
          <div class="col-12 col-md-2">
            <button type="button" class="btn btn-nobiva btn-sm w-100" (click)="applyFilter()">
              <i class="bi bi-funnel me-1"></i>Filtrar
            </button>
          </div>
        </div>
      </div>
    </div>
