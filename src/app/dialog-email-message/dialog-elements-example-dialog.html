<h2 mat-dialog-title>Enviar um email para proprietário. </h2>
<mat-dialog-content>

  <app-success [successMessageData]="display.success"/>

  <app-danger [dangerMessagesData]="display.errors"/>

  <form [formGroup]="contactForm" (ngSubmit)="onSubmit()">

      <div class="row">
        <mat-form-field>
          <mat-label>Digite seu email</mat-label>
          <input matInput formControlName="clientEmail"/>
          @if (getEmailError()) {
            <mat-error>{{ getEmailError() }}</mat-error>
          }
        </mat-form-field>
      </div>

      <div class="row">
        <mat-form-field class="full-width">
          <mat-label>Deixa uma mensagem</mat-label>
          <textarea matInput formControlName="message"></textarea>
          @if (getMessageError()) {
            <mat-error>{{ getMessageError() }}</mat-error>
          }
        </mat-form-field>
      </div>

      <mat-dialog-actions>
        <button matButton mat-dialog-close>Close</button>
        <button matButton="filled">Enviar</button>
      </mat-dialog-actions>
  </form>

</mat-dialog-content>
